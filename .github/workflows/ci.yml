name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Check formatting
        run: npx prettier {.,src}/*.js *.json *.md --check

      - name: Run ESLint
        run: npm run lint

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Spellcheck markdown
        run: npm run spellcheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/AwsSdk.js || (echo "AwsSdk.js not found in dist/" && exit 1)
          test -f dist/Config.js || (echo "Config.js not found in dist/" && exit 1)
          test -f dist/S3.js || (echo "S3.js not found in dist/" && exit 1)
          echo "Build output verified successfully"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test
