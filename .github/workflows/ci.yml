name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Check formatting
        run: npx prettier {.,src,test}/*.js *.json *.md --check

      - name: Run ESLint
        run: npm run lint

  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Spellcheck markdown
        continue-on-error: true
        run: npm run spellcheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist output
        run: |
          for f in AwsSdk.js Config.js S3.js Ses.js Lambda.js EC2.js DynamoDB.js SNS.js SQS.js Polyfill.js Crypto.js Xml.js; do
            test -f "dist/$f" || (echo "$f not found in dist/" && exit 1)
          done
          echo "Build output verified successfully"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test
